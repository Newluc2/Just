# ============================================
# Just - Configuration Nginx
# Sert le frontend React et fait reverse proxy
# vers le backend Express + Socket.io
# ============================================

server {
    listen 5173;
    server_name _;

    # Taille max des uploads (avatars, fichiers)
    client_max_body_size 10M;

    # ---- Servir le frontend React (SPA) ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Reverse proxy : API REST ----
    location /api/ {
        proxy_pass http://backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Reverse proxy : Socket.io (WebSocket) ----
    location /socket.io/ {
        proxy_pass http://backend:5001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts longs pour les connexions WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Reverse proxy : Uploads ----
    location /uploads/ {
        proxy_pass http://backend:5001/uploads/;
        proxy_set_header Host $host;
    }

    # ---- Cache pour les assets statiques ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
